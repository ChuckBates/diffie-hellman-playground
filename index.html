<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Secret Handshake Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
        box-sizing: border-box;
    }
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.4;
    }
    h1 { margin-bottom: 10px; }
    .box {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    textarea { resize: none; height: 60px; }
    button { cursor: pointer; }
    .small { font-size: 14px; color: #666; }
  </style>
</head>
<body>

<h1>Secret Handshake</h1>
<p>
Two people can agree on a shared secret without ever sending the secret itself.
</p>

<div class="box">
  <h3>Step 1: Choose Your Secret Number</h3>
  <button onclick="randomSecret()">Random Secret Number</button>
  <input id="private" placeholder="Generate Random Secret Number"/>

  <button onclick="generatePublic()">Generate Public Value</button>

  <label>Your Public Value (share this)</label>
  <textarea id="public" readonly></textarea>
</div>

<div class="box">
  <h3>Step 2: Paste Your Partner's Public Value</h3>
  <textarea id="partnerPublic" placeholder="Paste their number here"></textarea>

  <button onclick="generateShared()">Generate Shared Secret</button>

  <label>Your Shared Secret</label>
  <textarea id="shared" readonly></textarea>
</div>

<p class="small">
(Refresh the page to reset.)
</p>

<script>
  // Fixed public numbers (small for demo purposes)
  const P = 1000003n;   // prime number
  const G = 2n;    // base number

  function modPow(base, exp, mod) {
    let result = 1n;
    base = base % mod;
    while (exp > 0n) {
      if (exp % 2n === 1n) {
        result = (result * base) % mod;
      }
      exp = exp / 2n;
      base = (base * base) % mod;
    }
    return result;
  }

  function randomSecret() {
    document.getElementById("private").value = Math.floor(Math.random() * 10000 + 1000);
  }

  function generatePublic() {
    const priv = BigInt(document.getElementById("private").value);
    const pub = modPow(G, priv, P);
    document.getElementById("public").value = pub.toString();
  }

  function generateShared() {
    const priv = BigInt(document.getElementById("private").value);
    const partner = BigInt(document.getElementById("partnerPublic").value);
    const shared = modPow(partner, priv, P);
    document.getElementById("shared").value = shared.toString();
  }
</script>

</body>
</html>
